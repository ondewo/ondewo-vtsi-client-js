<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>ONDEWO VTSI JS client — browser example</title>
	</head>
	<body>
		<h1>ONDEWO VTSI JS client — browser example</h1>
		<p>Open the developer console to see the listed calls (needs a reachable gRPC-web / Envoy endpoint).</p>

		<!-- The generated stubs expose everything under the global `ondewo_vtsi_api`. -->
		<script src="../api/ondewo_vtsi_api.min.js"></script>
		<script>
			// In the browser, obtain a bearer token from Keycloak (D18 offline-token flow) and pass it as
			// gRPC `Authorization` metadata. Fill in the config object below with your endpoint, project and token.
			const config = {
				vtsiHost: 'https://localhost:8443',
				vtsiProjectName: 'projects/<project_uuid>/project',
				authorizationToken: 'Bearer <your-keycloak-access-token>'
			};

			const client = new ondewo_vtsi_api.CallsPromiseClient(config.vtsiHost, null, { withCredentials: false });

			const request = new ondewo_vtsi_api.ListCallsRequest();
			request.setVtsiProjectName(config.vtsiProjectName);

			client
				.listCalls(request, { Authorization: config.authorizationToken })
				.then((response) => {
					console.log('Number of calls: ' + response.getCallsList().length);
				})
				.catch((error) => {
					console.log('An error occurred: ' + error);
				});
		</script>
	</body>
</html>
